<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — Adrián J.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Adrián J.</a>
  <ul class="nav-links">
    <li><a href="/#about">About</a></li>
    <li><a href="/#services">Services</a></li>
    <li><a href="/#projects">Projects</a></li>
    <li><a href="/#blog">Blog</a></li>
    <li><a href="/#contact">Contact</a></li>
  </ul>
  <a href="/#contact" class="btn btn-primary" style="padding:0.55rem 1.2rem; font-size:0.72rem;">Get in touch</a>
</nav>

<main class="post-page">
  <div class="post-article fade-in">
    <a href="/#blog" class="post-back">← All posts</a>
    <div class="post-article-date">{{ page.date | date: "%B %Y" }}</div>
    <h1 class="post-article-title">{{ page.title }}</h1>
    <div class="post-article-body">
      {{ content }}
    </div>
    {% if page.linkedin_url %}
    <a href="{{ page.linkedin_url }}" target="_blank" rel="noopener" class="post-li-link">Read on LinkedIn ↗</a>
    {% endif %}
  </div>
</main>

<footer>
  <a href="/" class="footer-logo">Adrián J.</a>
  <span class="footer-copy">© 2025 AJProductions. Based near Barcelona.</span>
  <a href="https://www.linkedin.com/in/adrian-jaime-pastor/" target="_blank" class="btn btn-ghost" style="padding:0.45rem 1rem; font-size:0.7rem;">LinkedIn ↗</a>
</footer>

<script>
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.08 });
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
</body>
</html>
