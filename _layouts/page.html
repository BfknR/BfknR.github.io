<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — Adrián J.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>

<div id="scroll-progress"></div>
<nav>
  <a href="/" class="nav-logo">Adrián J.</a>
  <ul class="nav-links">
    <li><a href="/#about">About</a></li>
    <li><a href="/#services">Services</a></li>
    <li><a href="/#projects">Projects</a></li>
    <li><a href="/blog/" class="active">Blog</a></li>
    <li><a href="/#contact">Contact</a></li>
  </ul>
  <div class="nav-right">
    <a href="/#contact" class="btn btn-primary nav-cta" style="padding:0.55rem 1.2rem; font-size:0.72rem;">Get in touch</a>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<ul class="nav-mobile-panel" id="nav-mobile-panel">
  <li><a href="/#about">About</a></li>
  <li><a href="/#services">Services</a></li>
  <li><a href="/#projects">Projects</a></li>
  <li><a href="/blog/" class="active">Blog</a></li>
  <li><a href="/#contact">Contact</a></li>
  <li><a href="/#contact" class="btn btn-primary">Get in touch</a></li>
</ul>

{{ content }}

<footer>
  <a href="/" class="footer-logo">Adrián J.</a>
  <span class="footer-copy">© 2025 AJProductions. Based near Barcelona.</span>
  <a href="https://www.linkedin.com/in/adrian-jaime-pastor/" target="_blank" class="btn btn-ghost" style="padding:0.45rem 1rem; font-size:0.7rem;">LinkedIn ↗</a>
</footer>

<script>
  const progressBar = document.getElementById('scroll-progress');
  window.addEventListener('scroll', () => {
    const total = document.documentElement.scrollHeight - window.innerHeight;
    if (total > 0) progressBar.style.width = (window.scrollY / total * 100) + '%';
  }, { passive: true });

  const hamburger = document.getElementById('nav-hamburger');
  const mobilePanel = document.getElementById('nav-mobile-panel');
  hamburger.addEventListener('click', () => {
    const open = hamburger.classList.toggle('open');
    mobilePanel.classList.toggle('open', open);
    document.body.style.overflow = open ? 'hidden' : '';
  });
  mobilePanel.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      hamburger.classList.remove('open');
      mobilePanel.classList.remove('open');
      document.body.style.overflow = '';
    });
  });

  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.08 });
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
</body>
</html>
