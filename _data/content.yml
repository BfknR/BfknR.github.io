about:
  label: "About"
  heading: "Programmer first,<br>producer by necessity."
  paragraphs:
  - "I write code. I've also built a studio from scratch, led a <strong>team of 10</strong>, raised funding, and <strong>shipped a live mobile game</strong>."
  - "That experience doesn't leave you when you sit down to write a feature. You think about scope, about what the designer actually needs, about what breaks in production. You write code that fits the game, not just the spec."
  - "After Project Legends I spent <strong>two years in Saudi Arabia</strong> with GameBCN, mentoring early-stage studios on production, game design, and shipping. That included programming sessions — gameplay patterns and architecture — delivered as group talks and one-on-one with individual developers."
  - "Based near Barcelona. <strong>Nine years</strong> across programming, production, and design. Currently looking for a <strong>Gameplay Programmer</strong> role."
